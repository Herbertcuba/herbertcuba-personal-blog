<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="system-ui, sans-serif">
  <rect width="960" height="520" fill="#0a0a0a"/>
  
  <!-- Title -->
  <text x="480" y="40" fill="#ffffff" font-size="18" font-weight="bold" text-anchor="middle">One Framework, Multiple Instances</text>
  
  <!-- Left cycle: Content Production -->
  <g transform="translate(200, 270)">
    <!-- Cycle ring -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="#1e293b" stroke-width="2"/>
    
    <!-- Strategic arc (top) -->
    <path d="M -90,-90 A 130,130 0 0,1 90,-90" fill="none" stroke="#3b82f6" stroke-width="4"/>
    <text x="0" y="-110" fill="#3b82f6" font-size="13" font-weight="bold" text-anchor="middle">STRATEGIC</text>
    
    <!-- Execution arc (right-bottom) -->
    <path d="M 90,-90 A 130,130 0 0,1 0,130" fill="none" stroke="#14b8a6" stroke-width="4"/>
    <text x="110" y="30" fill="#14b8a6" font-size="13" font-weight="bold" text-anchor="middle">EXECUTION</text>
    
    <!-- Reflection arc (left-bottom) -->
    <path d="M 0,130 A 130,130 0 0,1 -90,-90" fill="none" stroke="#e11d48" stroke-width="4"/>
    <text x="-115" y="30" fill="#e11d48" font-size="13" font-weight="bold" text-anchor="middle">REFLECTION</text>
    
    <!-- Arrows -->
    <polygon points="88,-92 95,-82 82,-85" fill="#3b82f6"/>
    <polygon points="-2,128 8,132 5,122" fill="#14b8a6"/>
    <polygon points="-88,-88 -92,-98 -82,-92" fill="#e11d48"/>
    
    <!-- Center label -->
    <rect x="-70" y="-20" width="140" height="40" rx="6" fill="#1e293b"/>
    <text x="0" y="6" fill="#f59e0b" font-size="14" font-weight="bold" text-anchor="middle">CONTENT</text>
    <text x="0" y="22" fill="#94a3b8" font-size="10" text-anchor="middle">Daily cadence</text>
  </g>
  
  <!-- Right cycle: Product Development -->
  <g transform="translate(760, 270)">
    <!-- Cycle ring -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="#1e293b" stroke-width="2"/>
    
    <!-- Strategic arc (top) -->
    <path d="M -90,-90 A 130,130 0 0,1 90,-90" fill="none" stroke="#3b82f6" stroke-width="4"/>
    <text x="0" y="-110" fill="#3b82f6" font-size="13" font-weight="bold" text-anchor="middle">STRATEGIC</text>
    
    <!-- Execution arc (right-bottom) -->
    <path d="M 90,-90 A 130,130 0 0,1 0,130" fill="none" stroke="#14b8a6" stroke-width="4"/>
    <text x="110" y="30" fill="#14b8a6" font-size="13" font-weight="bold" text-anchor="middle">EXECUTION</text>
    
    <!-- Reflection arc (left-bottom) -->
    <path d="M 0,130 A 130,130 0 0,1 -90,-90" fill="none" stroke="#e11d48" stroke-width="4"/>
    <text x="-115" y="30" fill="#e11d48" font-size="13" font-weight="bold" text-anchor="middle">REFLECTION</text>
    
    <!-- Arrows -->
    <polygon points="88,-92 95,-82 82,-85" fill="#3b82f6"/>
    <polygon points="-2,128 8,132 5,122" fill="#14b8a6"/>
    <polygon points="-88,-88 -92,-98 -82,-92" fill="#e11d48"/>
    
    <!-- Center label -->
    <rect x="-70" y="-20" width="140" height="40" rx="6" fill="#1e293b"/>
    <text x="0" y="6" fill="#f59e0b" font-size="14" font-weight="bold" text-anchor="middle">PRODUCT</text>
    <text x="0" y="22" fill="#94a3b8" font-size="10" text-anchor="middle">Weekly cadence</text>
  </g>
  
  <!-- Shared Human Pool (center) -->
  <rect x="380" y="200" width="200" height="140" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="480" y="230" fill="#f59e0b" font-size="14" font-weight="bold" text-anchor="middle">SHARED HUMANS</text>
  <text x="480" y="255" fill="#94a3b8" font-size="11" text-anchor="middle">AI Engineer</text>
  <text x="480" y="273" fill="#94a3b8" font-size="11" text-anchor="middle">Developer</text>
  <text x="480" y="291" fill="#94a3b8" font-size="11" text-anchor="middle">Product Manager</text>
  <text x="480" y="309" fill="#94a3b8" font-size="11" text-anchor="middle">Security Engineer</text>
  
  <!-- Connecting lines -->
  <line x1="330" y1="270" x2="380" y2="270" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="580" y1="270" x2="630" y2="270" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,4"/>
  
  <!-- Subtitle -->
  <text x="480" y="480" fill="#64748b" font-size="12" text-anchor="middle">Same framework. Same people. Different instances, cadences, and configurations.</text>
</svg>