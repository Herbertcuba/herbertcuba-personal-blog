<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" width="1200" height="550">
  <rect width="1200" height="550" fill="#0a0a0a"/>
  
  <text x="600" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">THE APEX CYCLE</text>
  <text x="600" y="57" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666">Strategy Phase → Execution Phase → Reflection Phase → repeat</text>
  <line x1="250" y1="70" x2="950" y2="70" stroke="#333" stroke-width="1"/>

  <!-- Strategy Phase -->
  <rect x="40" y="100" width="340" height="320" fill="#111" stroke="#3b82f6" stroke-width="2.5"/>
  <rect x="40" y="100" width="340" height="6" fill="#3b82f6"/>
  <text x="210" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Strategy Phase</text>
  <text x="210" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#3b82f6">Human-First</text>
  <text x="210" y="183" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#555">Velocity: 2-3x</text>
  <line x1="70" y1="195" x2="350" y2="195" stroke="#222" stroke-width="1"/>
  <text x="70" y="218" font-family="system-ui, sans-serif" font-size="12" fill="#e0e0e0">Design all 9 domains</text>
  
  <text x="70" y="248" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6">PLATFORM</text>
  <text x="70" y="265" font-family="system-ui, sans-serif" font-size="10" fill="#777">Harness · Infra · Security</text>
  
  <text x="70" y="290" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6">SPECS</text>
  <text x="70" y="307" font-family="system-ui, sans-serif" font-size="10" fill="#777">Context · Spec Eng · QA Strategic</text>
  
  <text x="70" y="332" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6">CONFIG</text>
  <text x="70" y="349" font-family="system-ui, sans-serif" font-size="10" fill="#777">Agent Design · Orchestration · QA Ops</text>
  
  <text x="70" y="400" font-family="system-ui, sans-serif" font-size="10" fill="#555">Humans own every decision here.</text>

  <!-- Arrow Strategy → Execution -->
  <line x1="380" y1="260" x2="425" y2="260" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="423,254 435,260 423,266" fill="#14b8a6"/>

  <!-- Execution Phase -->
  <rect x="435" y="100" width="340" height="320" fill="#111" stroke="#14b8a6" stroke-width="2.5"/>
  <rect x="435" y="100" width="340" height="6" fill="#14b8a6"/>
  <text x="605" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Execution Phase</text>
  <text x="605" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#14b8a6">Agentic-First</text>
  <text x="605" y="183" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#555">Velocity: 10-20x</text>
  <line x1="465" y1="195" x2="745" y2="195" stroke="#222" stroke-width="1"/>
  
  <!-- Inner loop representation -->
  <text x="465" y="218" font-family="system-ui, sans-serif" font-size="12" fill="#e0e0e0">INNER LOOP</text>
  <text x="465" y="245" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Agentic Work</text>
  <text x="465" y="265" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Agentic Review</text>
  <text x="465" y="285" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ × iterations</text>
  
  <line x1="465" y1="305" x2="745" y2="305" stroke="#222" stroke-width="1"/>
  
  <rect x="465" y="315" width="170" height="35" fill="#1a1a1a" stroke="#e11d48" stroke-width="1.5" rx="2"/>
  <text x="550" y="337" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#e11d48">Human Verification</text>
  
  <text x="465" y="380" font-family="system-ui, sans-serif" font-size="10" fill="#555">Humans verify. Nothing else.</text>

  <!-- Arrow Execution → Reflection -->
  <line x1="775" y1="260" x2="820" y2="260" stroke="#14b8a6" stroke-width="2.5"/>
  <polygon points="818,254 830,260 818,266" fill="#f59e0b"/>

  <!-- Reflection Phase -->
  <rect x="830" y="100" width="340" height="320" fill="#111" stroke="#f59e0b" stroke-width="2.5"/>
  <rect x="830" y="100" width="340" height="6" fill="#f59e0b"/>
  <text x="1000" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Reflection Phase</text>
  <text x="1000" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b">Human-Last</text>
  <text x="1000" y="183" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#555">Velocity: 1-2x</text>
  <line x1="860" y1="195" x2="1140" y2="195" stroke="#222" stroke-width="1"/>

  <rect x="860" y="215" width="280" height="35" fill="#1a1a1a" stroke="#f59e0b" stroke-width="1" rx="2"/>
  <text x="1000" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f59e0b">Evaluate</text>
  
  <rect x="860" y="265" width="280" height="35" fill="#1a1a1a" stroke="#f59e0b" stroke-width="1" rx="2"/>
  <text x="1000" y="287" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f59e0b">Reflect</text>
  
  <rect x="860" y="315" width="280" height="35" fill="#1a1a1a" stroke="#f59e0b" stroke-width="1" rx="2"/>
  <text x="1000" y="337" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f59e0b">Calibrate</text>

  <text x="860" y="380" font-family="system-ui, sans-serif" font-size="10" fill="#555">Data in, decisions out.</text>
  <text x="860" y="400" font-family="system-ui, sans-serif" font-size="10" fill="#555">Feeds back to Strategy Phase.</text>

  <!-- Feedback arrow -->
  <path d="M 1000 420 L 1000 480 L 210 480 L 210 420" fill="none" stroke="#e11d48" stroke-width="2.5" stroke-dasharray="10,5"/>
  <polygon points="206,422 210,414 214,422" fill="#e11d48"/>
  <text x="605" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e11d48">SYSTEM EVOLVES → NEXT CYCLE</text>

  <text x="1170" y="540" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#333">APEX FRAMEWORK</text>
</svg>