<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <rect width="1200" height="500" fill="#0a0a0a"/>
  
  <text x="600" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">THE APEX CYCLE</text>
  <text x="600" y="57" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666">Strategic → Execution → Reflection → repeat</text>
  <line x1="250" y1="70" x2="950" y2="70" stroke="#333" stroke-width="1"/>

  <!-- Strategic -->
  <rect x="40" y="100" width="340" height="280" fill="#111" stroke="#3b82f6" stroke-width="2.5"/>
  <rect x="40" y="100" width="340" height="6" fill="#3b82f6"/>
  <text x="210" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Strategic</text>
  <text x="210" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#3b82f6">Human-First</text>
  <line x1="70" y1="180" x2="350" y2="180" stroke="#222" stroke-width="1"/>
  <text x="70" y="205" font-family="system-ui, sans-serif" font-size="12" fill="#e0e0e0">Design and configure all 9 domains</text>
  <text x="70" y="230" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Platform Area (harness, infra, security)</text>
  <text x="70" y="250" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Spec Area (context, specs, QA strategic)</text>
  <text x="70" y="270" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Config Area (agents, orchestration, QA ops)</text>
  <line x1="70" y1="290" x2="350" y2="290" stroke="#222" stroke-width="1"/>
  <text x="70" y="315" font-family="system-ui, sans-serif" font-size="11" fill="#555">Humans own the system design.</text>
  <text x="70" y="335" font-family="system-ui, sans-serif" font-size="11" fill="#555">All adjustments happen here.</text>
  <text x="70" y="365" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6">ROLES: All domain owners active</text>

  <!-- Arrow Strategic → Execution -->
  <line x1="380" y1="240" x2="425" y2="240" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="423,234 435,240 423,246" fill="#14b8a6"/>

  <!-- Execution -->
  <rect x="435" y="100" width="340" height="280" fill="#111" stroke="#14b8a6" stroke-width="2.5"/>
  <rect x="435" y="100" width="340" height="6" fill="#14b8a6"/>
  <text x="605" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Execution</text>
  <text x="605" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#14b8a6">Agent-First</text>
  <line x1="465" y1="180" x2="745" y2="180" stroke="#222" stroke-width="1"/>
  <text x="465" y="205" font-family="system-ui, sans-serif" font-size="12" fill="#e0e0e0">Agents execute within configured system</text>
  <text x="465" y="230" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ APEX Execution Loop runs N times</text>
  <text x="465" y="250" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Agent-to-agent review</text>
  <text x="465" y="270" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Spec → Execute → Review → Iterate</text>
  <line x1="465" y1="290" x2="745" y2="290" stroke="#222" stroke-width="1"/>
  <text x="465" y="315" font-family="system-ui, sans-serif" font-size="11" fill="#555">Humans do ONE thing: verify output.</text>
  <text x="465" y="335" font-family="system-ui, sans-serif" font-size="11" fill="#555">No specifying. No configuring.</text>
  <text x="465" y="365" font-family="system-ui, sans-serif" font-size="10" fill="#14b8a6">ROLES: Agents work, humans verify</text>

  <!-- Arrow Execution → Reflection -->
  <line x1="775" y1="240" x2="820" y2="240" stroke="#14b8a6" stroke-width="2.5"/>
  <polygon points="818,234 830,240 818,246" fill="#f59e0b"/>

  <!-- Reflection -->
  <rect x="830" y="100" width="340" height="280" fill="#111" stroke="#f59e0b" stroke-width="2.5"/>
  <rect x="830" y="100" width="340" height="6" fill="#f59e0b"/>
  <text x="1000" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Reflection</text>
  <text x="1000" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b">Feedback Checkpoint</text>
  <line x1="860" y1="180" x2="1140" y2="180" stroke="#222" stroke-width="1"/>
  <text x="860" y="205" font-family="system-ui, sans-serif" font-size="12" fill="#e0e0e0">Collect data, reflect, decide</text>
  <text x="860" y="230" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Agents report APEX Metrics</text>
  <text x="860" y="250" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Humans + agents brainstorm</text>
  <text x="860" y="270" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Decide what to change</text>
  <line x1="860" y1="290" x2="1140" y2="290" stroke="#222" stroke-width="1"/>
  <text x="860" y="315" font-family="system-ui, sans-serif" font-size="11" fill="#555">Feeds back to Strategic.</text>
  <text x="860" y="335" font-family="system-ui, sans-serif" font-size="11" fill="#555">System evolves every cycle.</text>
  <text x="860" y="365" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b">ROLES: Everyone contributes data + ideas</text>

  <!-- Feedback arrow (Reflection → Strategic) -->
  <path d="M 1000 380 L 1000 440 L 210 440 L 210 380" fill="none" stroke="#e11d48" stroke-width="2.5" stroke-dasharray="10,5"/>
  <polygon points="206,382 210,374 214,382" fill="#e11d48"/>
  <text x="605" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e11d48">CALIBRATE → SYSTEM EVOLVES → NEXT CYCLE</text>

  <text x="1170" y="495" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#333">APEX FRAMEWORK</text>
</svg>