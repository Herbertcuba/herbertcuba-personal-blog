<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="system-ui, sans-serif">
  <rect width="900" height="440" fill="#0a0a0a"/>
  
  <!-- Title -->
  <text x="450" y="35" fill="#ffffff" font-size="17" font-weight="bold" text-anchor="middle">Content Production — Execution Inner Loop</text>
  
  <!-- Brief -->
  <rect x="20" y="120" width="120" height="60" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="80" y="147" fill="#3b82f6" font-size="12" font-weight="bold" text-anchor="middle">Brief</text>
  <text x="80" y="165" fill="#64748b" font-size="10" text-anchor="middle">Topic + angle + tone</text>
  
  <line x1="140" y1="150" x2="170" y2="150" stroke="#475569" stroke-width="2"/>
  <polygon points="170,145 180,150 170,155" fill="#475569"/>
  
  <!-- Research -->
  <rect x="180" y="120" width="120" height="60" rx="6" fill="#1e293b" stroke="#14b8a6" stroke-width="2"/>
  <text x="240" y="147" fill="#14b8a6" font-size="12" font-weight="bold" text-anchor="middle">Research</text>
  <text x="240" y="165" fill="#64748b" font-size="10" text-anchor="middle">Sources + data</text>
  
  <line x1="300" y1="150" x2="330" y2="150" stroke="#475569" stroke-width="2"/>
  <polygon points="330,145 340,150 330,155" fill="#475569"/>
  
  <!-- Iteration loop -->
  <rect x="325" y="75" width="320" height="200" rx="8" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="485" y="95" fill="#475569" font-size="10" text-anchor="middle">AGENT ITERATION LOOP</text>
  
  <!-- Writer -->
  <rect x="345" y="120" width="120" height="60" rx="6" fill="#1e293b" stroke="#14b8a6" stroke-width="2"/>
  <text x="405" y="147" fill="#14b8a6" font-size="12" font-weight="bold" text-anchor="middle">Writer</text>
  <text x="405" y="165" fill="#64748b" font-size="10" text-anchor="middle">Draft article</text>
  
  <line x1="465" y1="150" x2="500" y2="150" stroke="#475569" stroke-width="2"/>
  <polygon points="500,145 510,150 500,155" fill="#475569"/>
  
  <!-- Review Agent with scores -->
  <rect x="510" y="110" width="125" height="80" rx="6" fill="#1e293b" stroke="#e11d48" stroke-width="2"/>
  <text x="572" y="135" fill="#e11d48" font-size="12" font-weight="bold" text-anchor="middle">Review</text>
  <text x="572" y="153" fill="#94a3b8" font-size="9" text-anchor="middle">Voice: 8/10</text>
  <text x="572" y="166" fill="#94a3b8" font-size="9" text-anchor="middle">SEO: 6/10 → revise</text>
  <text x="572" y="179" fill="#94a3b8" font-size="9" text-anchor="middle">Accuracy: 9/10</text>
  
  <!-- Iteration arrow back -->
  <path d="M 572,195 L 572,235 L 405,235 L 405,185" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="400,185 405,175 410,185" fill="#f59e0b"/>
  <text x="488" y="253" fill="#f59e0b" font-size="10" text-anchor="middle">revise until all dimensions pass</text>
  
  <!-- Arrow to Verification -->
  <line x1="645" y1="150" x2="680" y2="150" stroke="#475569" stroke-width="2"/>
  <polygon points="680,145 690,150 680,155" fill="#475569"/>
  
  <!-- Human Verification -->
  <rect x="690" y="110" width="180" height="80" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="780" y="138" fill="#f59e0b" font-size="12" font-weight="bold" text-anchor="middle">Human Verification</text>
  <text x="780" y="156" fill="#94a3b8" font-size="10" text-anchor="middle">Editorial Lead checks:</text>
  <text x="780" y="172" fill="#94a3b8" font-size="10" text-anchor="middle">audience value + angle + voice</text>
  
  <!-- Artifacts -->
  <text x="450" y="325" fill="#64748b" font-size="11" font-weight="bold" text-anchor="middle">ARTIFACTS</text>
  
  <rect x="40" y="345" width="140" height="40" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
  <text x="110" y="370" fill="#3b82f6" font-size="10" text-anchor="middle">Editorial brief</text>
  
  <rect x="210" y="345" width="140" height="40" rx="4" fill="#0f172a" stroke="#14b8a6" stroke-width="1"/>
  <text x="280" y="370" fill="#14b8a6" font-size="10" text-anchor="middle">Source collection</text>
  
  <rect x="380" y="345" width="140" height="40" rx="4" fill="#0f172a" stroke="#14b8a6" stroke-width="1"/>
  <text x="450" y="370" fill="#14b8a6" font-size="10" text-anchor="middle">Article draft</text>
  
  <rect x="550" y="345" width="140" height="40" rx="4" fill="#0f172a" stroke="#e11d48" stroke-width="1"/>
  <text x="620" y="370" fill="#e11d48" font-size="10" text-anchor="middle">Review scorecard</text>
  
  <rect x="720" y="345" width="140" height="40" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
  <text x="790" y="370" fill="#f59e0b" font-size="10" text-anchor="middle">Published article</text>
  
  <line x1="180" y1="365" x2="210" y2="365" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="350" y1="365" x2="380" y2="365" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="520" y1="365" x2="550" y2="365" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="690" y1="365" x2="720" y2="365" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
</svg>