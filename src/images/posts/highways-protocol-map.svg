<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="1000" height="400">
  <rect width="1000" height="400" fill="#0a0a0a"/>
  
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#ffffff">THE FOUR PROTOCOLS</text>
  <text x="500" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#666">Each solves a different connectivity problem in the agent era</text>
  <line x1="150" y1="68" x2="850" y2="68" stroke="#333" stroke-width="1"/>

  <!-- WebMCP -->
  <rect x="30" y="90" width="220" height="140" fill="#111" stroke="#3b82f6" stroke-width="2"/>
  <rect x="30" y="90" width="220" height="4" fill="#3b82f6"/>
  <text x="140" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff">WebMCP</text>
  <text x="140" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6">Agent ↔ Websites</text>
  <line x1="50" y1="158" x2="230" y2="158" stroke="#222" stroke-width="1"/>
  <text x="50" y="178" font-family="system-ui, sans-serif" font-size="10" fill="#777">Websites expose tools</text>
  <text x="50" y="195" font-family="system-ui, sans-serif" font-size="10" fill="#777">to agents via browser API.</text>
  <text x="50" y="215" font-family="system-ui, sans-serif" font-size="9" fill="#555">W3C standard · Chrome 146+</text>

  <!-- A2A -->
  <rect x="270" y="90" width="220" height="140" fill="#111" stroke="#14b8a6" stroke-width="2"/>
  <rect x="270" y="90" width="220" height="4" fill="#14b8a6"/>
  <text x="380" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff">A2A</text>
  <text x="380" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#14b8a6">Agent ↔ Agent</text>
  <line x1="290" y1="158" x2="470" y2="158" stroke="#222" stroke-width="1"/>
  <text x="290" y="178" font-family="system-ui, sans-serif" font-size="10" fill="#777">Cross-org agent discovery</text>
  <text x="290" y="195" font-family="system-ui, sans-serif" font-size="10" fill="#777">and collaboration.</text>
  <text x="290" y="215" font-family="system-ui, sans-serif" font-size="9" fill="#555">Google + 50 partners · Agent Cards</text>

  <!-- MCP -->
  <rect x="510" y="90" width="220" height="140" fill="#111" stroke="#f59e0b" stroke-width="2"/>
  <rect x="510" y="90" width="220" height="4" fill="#f59e0b"/>
  <text x="620" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff">MCP</text>
  <text x="620" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#f59e0b">Agent ↔ Tools</text>
  <line x1="530" y1="158" x2="710" y2="158" stroke="#222" stroke-width="1"/>
  <text x="530" y="178" font-family="system-ui, sans-serif" font-size="10" fill="#777">Universal adapter for</text>
  <text x="530" y="195" font-family="system-ui, sans-serif" font-size="10" fill="#777">APIs, databases, services.</text>
  <text x="530" y="215" font-family="system-ui, sans-serif" font-size="9" fill="#555">Anthropic · Industry-wide adoption</text>

  <!-- TOON -->
  <rect x="750" y="90" width="220" height="140" fill="#111" stroke="#a855f7" stroke-width="2"/>
  <rect x="750" y="90" width="220" height="4" fill="#a855f7"/>
  <text x="860" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff">TOON</text>
  <text x="860" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a855f7">Data ↔ LLM</text>
  <line x1="770" y1="158" x2="950" y2="158" stroke="#222" stroke-width="1"/>
  <text x="770" y="178" font-family="system-ui, sans-serif" font-size="10" fill="#777">Token-efficient format</text>
  <text x="770" y="195" font-family="system-ui, sans-serif" font-size="10" fill="#777">for structured data.</text>
  <text x="770" y="215" font-family="system-ui, sans-serif" font-size="9" fill="#555">40% fewer tokens · YAML + CSV</text>

  <!-- Connection line -->
  <line x1="250" y1="160" x2="270" y2="160" stroke="#333" stroke-width="1.5"/>
  <line x1="490" y1="160" x2="510" y2="160" stroke="#333" stroke-width="1.5"/>
  <line x1="730" y1="160" x2="750" y2="160" stroke="#333" stroke-width="1.5"/>

  <!-- Bottom: Headless CMS layer -->
  <rect x="30" y="260" width="940" height="60" fill="#111" stroke="#666" stroke-width="1"/>
  <text x="500" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#999">HEADLESS CMS — Structured content layer that all four protocols connect to</text>
  <text x="500" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#555">API-first · Structured · Governed · Agent-ready</text>

  <!-- Arrows down to CMS -->
  <line x1="140" y1="230" x2="140" y2="260" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="380" y1="230" x2="380" y2="260" stroke="#14b8a6" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="620" y1="230" x2="620" y2="260" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="860" y1="230" x2="860" y2="260" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Footer -->
  <text x="970" y="380" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#333">cubagarcia.com</text>
</svg>