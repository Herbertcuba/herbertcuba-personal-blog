<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <rect width="1000" height="700" fill="#0a0a0a"/>
  
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">THE APEX LOOPS</text>
  <text x="500" y="57" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666">Strategic (outer) and Execution (inner) — nested, connected by Calibration</text>
  <line x1="200" y1="70" x2="800" y2="70" stroke="#333" stroke-width="1"/>

  <!-- OUTER LOOP (Strategic) — large open circle -->
  <path d="M 620 140 A 270 270 0 1 0 670 310" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <polygon points="672,305 680,320 664,316" fill="#3b82f6"/>
  
  <!-- Outer loop label -->
  <text x="130" y="120" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#3b82f6">STRATEGIC</text>
  <text x="130" y="140" font-family="system-ui, sans-serif" font-size="12" fill="#3b82f6">(Outer Loop)</text>

  <!-- Verification Gate in the outer loop gap -->
  <rect x="620" y="155" width="110" height="55" fill="#111" stroke="#e11d48" stroke-width="2" rx="2"/>
  <text x="675" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#e11d48">VERIFICATION</text>
  <text x="675" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#e11d48">GATE</text>

  <!-- Outer loop steps along the arc -->
  <!-- Top: Spec -->
  <rect x="300" y="100" width="160" height="45" fill="#111" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="380" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Specify</text>

  <!-- Left: Configure -->
  <rect x="65" y="300" width="160" height="45" fill="#111" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="145" y="328" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Configure</text>

  <!-- Bottom: Reflect -->
  <rect x="300" y="530" width="160" height="45" fill="#111" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="380" y="558" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Reflect</text>

  <!-- Right: Verify (near gate) -->
  <rect x="640" y="430" width="160" height="45" fill="#111" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="720" y="458" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Verify Delivery</text>

  <!-- INNER LOOP (Execution) — smaller open circle -->
  <path d="M 510 260 A 130 130 0 1 0 540 340" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <polygon points="542,335 548,350 534,344" fill="#f59e0b"/>

  <!-- Inner loop label -->
  <text x="320" y="270" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#f59e0b">EXECUTION</text>
  <text x="320" y="290" font-family="system-ui, sans-serif" font-size="11" fill="#f59e0b">(Inner Loop)</text>

  <!-- Quality Gate in the inner loop gap -->
  <rect x="505" y="265" width="90" height="45" fill="#111" stroke="#e11d48" stroke-width="2" rx="2"/>
  <text x="550" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#e11d48">QUALITY</text>
  <text x="550" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#e11d48">GATE</text>

  <!-- Inner loop steps -->
  <rect x="340" y="320" width="120" height="35" fill="#111" stroke="#f59e0b" stroke-width="1" rx="2"/>
  <text x="400" y="342" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">Execute</text>

  <rect x="280" y="390" width="120" height="35" fill="#111" stroke="#f59e0b" stroke-width="1" rx="2"/>
  <text x="340" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">Review</text>

  <rect x="400" y="430" width="120" height="35" fill="#111" stroke="#f59e0b" stroke-width="1" rx="2"/>
  <text x="460" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">Iterate</text>

  <!-- Calibration connection (dashed, inner → outer) -->
  <path d="M 460 465 L 460 530" fill="none" stroke="#e11d48" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="456,528 460,536 464,528" fill="#e11d48"/>

  <rect x="470" y="490" width="110" height="28" fill="#0a0a0a" stroke="#e11d48" stroke-width="1.5" rx="2"/>
  <text x="525" y="509" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#e11d48">CALIBRATION</text>

  <!-- Legend -->
  <rect x="750" y="530" width="12" height="12" fill="#3b82f6"/>
  <text x="770" y="541" font-family="system-ui, sans-serif" font-size="10" fill="#777">Strategic (Outer Loop)</text>
  <rect x="750" y="555" width="12" height="12" fill="#f59e0b"/>
  <text x="770" y="566" font-family="system-ui, sans-serif" font-size="10" fill="#777">Execution (Inner Loop)</text>
  <rect x="750" y="580" width="12" height="12" fill="#e11d48"/>
  <text x="770" y="591" font-family="system-ui, sans-serif" font-size="10" fill="#777">Gates &amp; Calibration</text>

  <!-- Description -->
  <text x="500" y="640" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#555">Inner loop runs N times per work cycle. Outer loop closes with Verification.</text>
  <text x="500" y="660" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#555">Calibration feeds execution data back to Strategic for system evolution.</text>

  <text x="970" y="690" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#333">APEX FRAMEWORK</text>
</svg>