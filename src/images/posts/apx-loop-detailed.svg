<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" width="1200" height="450">
  <rect width="1200" height="450" fill="#0a0a0a"/>
  
  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">THE APX LOOP</text>
  <text x="600" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666">Runs N times per work cycle within the Agentic-First phase</text>
  <line x1="200" y1="68" x2="1000" y2="68" stroke="#333" stroke-width="1"/>

  <!-- Zone labels -->
  <text x="130" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#3b82f6">HUMAN-FIRST</text>
  <text x="560" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#14b8a6">AGENTIC-FIRST</text>
  <text x="1020" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#f59e0b">HUMAN-LAST</text>

  <!-- Dividers -->
  <line x1="270" y1="80" x2="270" y2="320" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="860" y1="80" x2="860" y2="320" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: Spec -->
  <rect x="40" y="110" width="200" height="90" fill="#111" stroke="#3b82f6" stroke-width="2"/>
  <rect x="40" y="110" width="200" height="4" fill="#3b82f6"/>
  <text x="60" y="140" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6" font-weight="600">SPEC</text>
  <text x="60" y="162" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Human writes spec</text>
  <text x="60" y="182" font-family="system-ui, sans-serif" font-size="10" fill="#777">Intent Architecture</text>

  <!-- Arrow -->
  <line x1="240" y1="155" x2="310" y2="155" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="308,151 316,155 308,159" fill="#14b8a6"/>

  <!-- Step 2: Execute -->
  <rect x="320" y="110" width="200" height="90" fill="#111" stroke="#14b8a6" stroke-width="2"/>
  <rect x="320" y="110" width="200" height="4" fill="#14b8a6"/>
  <text x="340" y="140" font-family="system-ui, sans-serif" font-size="11" fill="#14b8a6" font-weight="600">EXECUTE</text>
  <text x="340" y="162" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Agent works</text>
  <text x="340" y="182" font-family="system-ui, sans-serif" font-size="10" fill="#777">Worker agent produces</text>

  <!-- Arrow -->
  <line x1="520" y1="155" x2="590" y2="155" stroke="#14b8a6" stroke-width="1.5"/>
  <polygon points="588,151 596,155 588,159" fill="#14b8a6"/>

  <!-- Step 3: Review -->
  <rect x="600" y="110" width="200" height="90" fill="#111" stroke="#14b8a6" stroke-width="2"/>
  <rect x="600" y="110" width="200" height="4" fill="#14b8a6"/>
  <text x="620" y="140" font-family="system-ui, sans-serif" font-size="11" fill="#14b8a6" font-weight="600">REVIEW</text>
  <text x="620" y="162" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Agent reviews</text>
  <text x="620" y="182" font-family="system-ui, sans-serif" font-size="10" fill="#777">PM/reviewer evaluates</text>

  <!-- Iterate loop -->
  <path d="M 700 200 L 700 240 L 420 240 L 420 200" fill="none" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="416,202 420,194 424,202" fill="#e11d48"/>
  <text x="560" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#e11d48">ITERATE UNTIL SPEC MET</text>

  <!-- Arrow to verify -->
  <line x1="800" y1="155" x2="880" y2="155" stroke="#14b8a6" stroke-width="1.5"/>
  <polygon points="878,151 886,155 878,159" fill="#f59e0b"/>

  <!-- Step 4: Verify -->
  <rect x="890" y="110" width="260" height="90" fill="#111" stroke="#f59e0b" stroke-width="2"/>
  <rect x="890" y="110" width="260" height="4" fill="#f59e0b"/>
  <text x="910" y="140" font-family="system-ui, sans-serif" font-size="11" fill="#f59e0b" font-weight="600">VERIFY</text>
  <text x="910" y="162" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Human verifies</text>
  <text x="910" y="182" font-family="system-ui, sans-serif" font-size="10" fill="#777">Domain-mapped quality gate</text>

  <!-- Trust Architecture bar -->
  <rect x="40" y="300" width="1110" height="35" fill="#111" stroke="#f59e0b" stroke-width="1"/>
  <text x="600" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#f59e0b">TRUST ARCHITECTURE — permissions, compliance, and guardrails enforced throughout all phases</text>

  <!-- Legend -->
  <rect x="40" y="365" width="12" height="12" fill="#3b82f6"/>
  <text x="60" y="376" font-family="system-ui, sans-serif" font-size="11" fill="#999">Human-First</text>
  
  <rect x="200" y="365" width="12" height="12" fill="#14b8a6"/>
  <text x="220" y="376" font-family="system-ui, sans-serif" font-size="11" fill="#999">Agentic-First</text>
  
  <rect x="360" y="365" width="12" height="12" fill="#f59e0b"/>
  <text x="380" y="376" font-family="system-ui, sans-serif" font-size="11" fill="#999">Human-Last</text>

  <rect x="520" y="365" width="12" height="12" fill="#e11d48"/>
  <text x="540" y="376" font-family="system-ui, sans-serif" font-size="11" fill="#999">Iteration loop</text>

  <text x="1150" y="430" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#333">APEX FRAMEWORK</text>
</svg>