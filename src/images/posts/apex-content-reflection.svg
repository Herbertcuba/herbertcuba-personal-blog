<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="system-ui, sans-serif">
  <rect width="900" height="380" fill="#0a0a0a"/>
  
  <!-- Title -->
  <text x="450" y="35" fill="#ffffff" font-size="17" font-weight="bold" text-anchor="middle">Content Reflection — Data to Calibration</text>
  
  <!-- Data column -->
  <rect x="30" y="60" width="250" height="260" rx="8" fill="#0f172a" stroke="#e11d48" stroke-width="2"/>
  <text x="155" y="88" fill="#e11d48" font-size="13" font-weight="bold" text-anchor="middle">EXECUTION DATA</text>
  
  <rect x="50" y="105" width="210" height="35" rx="4" fill="#1e293b"/>
  <text x="155" y="120" fill="#94a3b8" font-size="10" text-anchor="middle">Blog posts: 75% first-pass</text>
  <rect x="50" y="100" width="158" height="5" rx="2" fill="#14b8a6" opacity="0.4"/>
  
  <rect x="50" y="155" width="210" height="35" rx="4" fill="#1e293b"/>
  <text x="155" y="170" fill="#94a3b8" font-size="10" text-anchor="middle">Social content: 40% first-pass</text>
  <rect x="50" y="150" width="84" height="5" rx="2" fill="#e11d48" opacity="0.5"/>
  
  <rect x="50" y="205" width="210" height="35" rx="4" fill="#1e293b"/>
  <text x="155" y="220" fill="#94a3b8" font-size="10" text-anchor="middle">LinkedIn: 3.2 avg iterations</text>
  
  <rect x="50" y="255" width="210" height="35" rx="4" fill="#1e293b"/>
  <text x="155" y="270" fill="#94a3b8" font-size="10" text-anchor="middle">Twitter/X: 4.1 avg iterations</text>
  
  <!-- Arrow -->
  <line x1="285" y1="190" x2="330" y2="190" stroke="#475569" stroke-width="2"/>
  <polygon points="328,185 340,190 328,195" fill="#475569"/>
  
  <!-- Insight column -->
  <rect x="340" y="60" width="230" height="260" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <text x="455" y="88" fill="#f59e0b" font-size="13" font-weight="bold" text-anchor="middle">INSIGHTS</text>
  
  <rect x="355" y="110" width="200" height="50" rx="4" fill="#1e293b"/>
  <text x="455" y="132" fill="#94a3b8" font-size="10" text-anchor="middle">Agent: "Social briefs lack</text>
  <text x="455" y="148" fill="#94a3b8" font-size="10" text-anchor="middle">platform-specific tone guidance"</text>
  
  <rect x="355" y="175" width="200" height="50" rx="4" fill="#1e293b"/>
  <text x="455" y="197" fill="#94a3b8" font-size="10" text-anchor="middle">Human: "LinkedIn ≠ Twitter.</text>
  <text x="455" y="213" fill="#94a3b8" font-size="10" text-anchor="middle">Briefs treat them the same."</text>
  
  <rect x="355" y="240" width="200" height="50" rx="4" fill="#1e293b"/>
  <text x="455" y="262" fill="#94a3b8" font-size="10" text-anchor="middle">Gap: Spec Engineering missing</text>
  <text x="455" y="278" fill="#94a3b8" font-size="10" text-anchor="middle">platform tone appendix</text>
  
  <!-- Arrow -->
  <line x1="575" y1="190" x2="620" y2="190" stroke="#475569" stroke-width="2"/>
  <polygon points="618,185 630,190 618,195" fill="#475569"/>
  
  <!-- Calibration column -->
  <rect x="630" y="60" width="240" height="260" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <text x="750" y="88" fill="#3b82f6" font-size="13" font-weight="bold" text-anchor="middle">CALIBRATION ACTIONS</text>
  
  <rect x="650" y="110" width="200" height="45" rx="4" fill="#1e293b" stroke="#14b8a6" stroke-width="1"/>
  <text x="750" y="130" fill="#14b8a6" font-size="10" text-anchor="middle">Spec Engineering:</text>
  <text x="750" y="145" fill="#94a3b8" font-size="9" text-anchor="middle">Add platform tone appendix to briefs</text>
  
  <rect x="650" y="170" width="200" height="45" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="750" y="190" fill="#f59e0b" font-size="10" text-anchor="middle">Agent Design:</text>
  <text x="750" y="205" fill="#94a3b8" font-size="9" text-anchor="middle">Writer gets platform-specific skills</text>
  
  <rect x="650" y="230" width="200" height="45" rx="4" fill="#1e293b" stroke="#e11d48" stroke-width="1"/>
  <text x="750" y="250" fill="#e11d48" font-size="10" text-anchor="middle">QA Operational:</text>
  <text x="750" y="265" fill="#94a3b8" font-size="9" text-anchor="middle">Platform-specific review criteria</text>
  
  <!-- Bottom label -->
  <text x="450" y="355" fill="#64748b" font-size="11" text-anchor="middle">→ Changes feed into the next Strategic Phase → next cycle runs on an evolved system</text>
</svg>