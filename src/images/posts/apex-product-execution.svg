<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="system-ui, sans-serif">
  <rect width="900" height="440" fill="#0a0a0a"/>
  
  <!-- Title -->
  <text x="450" y="35" fill="#ffffff" font-size="17" font-weight="bold" text-anchor="middle">Product Development — Execution Inner Loop</text>
  
  <!-- Flow boxes -->
  <!-- Feature Spec -->
  <rect x="30" y="120" width="130" height="60" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="95" y="147" fill="#3b82f6" font-size="12" font-weight="bold" text-anchor="middle">Feature Spec</text>
  <text x="95" y="165" fill="#64748b" font-size="10" text-anchor="middle">PRD + criteria</text>
  
  <!-- Arrow -->
  <line x1="160" y1="150" x2="195" y2="150" stroke="#475569" stroke-width="2"/>
  <polygon points="195,145 205,150 195,155" fill="#475569"/>
  
  <!-- Planner -->
  <rect x="205" y="120" width="120" height="60" rx="6" fill="#1e293b" stroke="#14b8a6" stroke-width="2"/>
  <text x="265" y="147" fill="#14b8a6" font-size="12" font-weight="bold" text-anchor="middle">Planner</text>
  <text x="265" y="165" fill="#64748b" font-size="10" text-anchor="middle">Decompose tasks</text>
  
  <!-- Arrow -->
  <line x1="325" y1="150" x2="360" y2="150" stroke="#475569" stroke-width="2"/>
  <polygon points="360,145 370,150 360,155" fill="#475569"/>
  
  <!-- Iteration loop box -->
  <rect x="355" y="80" width="310" height="190" rx="8" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="510" y="100" fill="#475569" font-size="10" text-anchor="middle">AGENT ITERATION LOOP (2-3 cycles)</text>
  
  <!-- Coder -->
  <rect x="375" y="120" width="120" height="60" rx="6" fill="#1e293b" stroke="#14b8a6" stroke-width="2"/>
  <text x="435" y="147" fill="#14b8a6" font-size="12" font-weight="bold" text-anchor="middle">Coder</text>
  <text x="435" y="165" fill="#64748b" font-size="10" text-anchor="middle">Implement</text>
  
  <!-- Arrow to Reviewer -->
  <line x1="495" y1="150" x2="525" y2="150" stroke="#475569" stroke-width="2"/>
  <polygon points="525,145 535,150 525,155" fill="#475569"/>
  
  <!-- Reviewer -->
  <rect x="535" y="120" width="120" height="60" rx="6" fill="#1e293b" stroke="#e11d48" stroke-width="2"/>
  <text x="595" y="147" fill="#e11d48" font-size="12" font-weight="bold" text-anchor="middle">Reviewer</text>
  <text x="595" y="165" fill="#64748b" font-size="10" text-anchor="middle">QA criteria check</text>
  
  <!-- Iteration arrow back -->
  <path d="M 595,185 L 595,230 L 435,230 L 435,185" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="430,185 435,175 440,185" fill="#f59e0b"/>
  <text x="515" y="248" fill="#f59e0b" font-size="10" text-anchor="middle">iterate if criteria not met</text>
  
  <!-- Arrow to Verification -->
  <line x1="665" y1="150" x2="700" y2="150" stroke="#475569" stroke-width="2"/>
  <polygon points="700,145 710,150 700,155" fill="#475569"/>
  
  <!-- Human Verification -->
  <rect x="710" y="110" width="160" height="80" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="790" y="140" fill="#f59e0b" font-size="12" font-weight="bold" text-anchor="middle">Human Verification</text>
  <text x="790" y="158" fill="#94a3b8" font-size="10" text-anchor="middle">Tech Lead verifies</text>
  <text x="790" y="174" fill="#94a3b8" font-size="10" text-anchor="middle">architecture + intent</text>
  
  <!-- Artifacts row -->
  <text x="450" y="330" fill="#64748b" font-size="11" font-weight="bold" text-anchor="middle">ARTIFACTS FLOWING THROUGH THE LOOP</text>
  
  <rect x="60" y="350" width="160" height="40" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="375" fill="#3b82f6" font-size="10" text-anchor="middle">PRD + acceptance criteria</text>
  
  <rect x="245" y="350" width="140" height="40" rx="4" fill="#0f172a" stroke="#14b8a6" stroke-width="1"/>
  <text x="315" y="375" fill="#14b8a6" font-size="10" text-anchor="middle">Task breakdown</text>
  
  <rect x="410" y="350" width="140" height="40" rx="4" fill="#0f172a" stroke="#14b8a6" stroke-width="1"/>
  <text x="480" y="375" fill="#14b8a6" font-size="10" text-anchor="middle">Code + tests</text>
  
  <rect x="575" y="350" width="140" height="40" rx="4" fill="#0f172a" stroke="#e11d48" stroke-width="1"/>
  <text x="645" y="375" fill="#e11d48" font-size="10" text-anchor="middle">Review report</text>
  
  <rect x="740" y="350" width="130" height="40" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
  <text x="805" y="375" fill="#f59e0b" font-size="10" text-anchor="middle">Verified feature</text>
  
  <!-- Connecting dots -->
  <line x1="220" y1="370" x2="245" y2="370" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="385" y1="370" x2="410" y2="370" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="550" y1="370" x2="575" y2="370" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="715" y1="370" x2="740" y2="370" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
</svg>