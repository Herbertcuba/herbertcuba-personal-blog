<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <rect width="1200" height="600" fill="#0a0a0a"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">THE ADAPT META-LOOP</text>
  <text x="600" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666">Three phases. One evolving system.</text>
  <line x1="250" y1="75" x2="950" y2="75" stroke="#333" stroke-width="1"/>

  <!-- Phase 1: Human-First -->
  <rect x="60" y="120" width="300" height="280" fill="#111" stroke="#3b82f6" stroke-width="2"/>
  <rect x="60" y="120" width="300" height="6" fill="#3b82f6"/>
  <text x="210" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6" font-weight="700">PHASE 1</text>
  <text x="210" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Human-First</text>
  <text x="210" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#999">Setup &amp; Configuration</text>
  
  <line x1="90" y1="230" x2="330" y2="230" stroke="#222" stroke-width="1"/>
  
  <text x="90" y="255" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Choose harness architecture</text>
  <text x="90" y="275" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Gather intent &amp; documentation</text>
  <text x="90" y="295" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Design workflows &amp; routing</text>
  <text x="90" y="315" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Configure platform &amp; tools</text>
  <text x="90" y="335" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Define quality criteria</text>
  <text x="90" y="355" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Set trust boundaries</text>
  
  <text x="210" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6">HUMANS DESIGN THE SYSTEM</text>

  <!-- Arrow 1→2 -->
  <line x1="360" y1="260" x2="430" y2="260" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="428,254 440,260 428,266" fill="#3b82f6"/>

  <!-- Phase 2: Agentic-First -->
  <rect x="450" y="120" width="300" height="280" fill="#111" stroke="#14b8a6" stroke-width="2"/>
  <rect x="450" y="120" width="300" height="6" fill="#14b8a6"/>
  <text x="600" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#14b8a6" font-weight="700">PHASE 2</text>
  <text x="600" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Agentic-First</text>
  <text x="600" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#999">Execution &amp; Iteration</text>
  
  <line x1="480" y1="230" x2="720" y2="230" stroke="#222" stroke-width="1"/>
  
  <text x="480" y="255" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ ADAPT Loop × N iterations</text>
  <text x="480" y="275" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Agent-to-agent review</text>
  <text x="480" y="295" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Spec → Execute → Review</text>
  <text x="480" y="315" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Iterate until spec is met</text>
  <text x="480" y="335" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Work cycle cadence</text>
  
  <!-- Mini loop indicator -->
  <path d="M 560 360 C 560 375, 640 375, 640 360" fill="none" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="638,362 644,358 640,368" fill="#14b8a6"/>
  <text x="600" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#14b8a6">iterate</text>
  
  <text x="600" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#14b8a6">AGENTS EXECUTE &amp; ITERATE</text>

  <!-- Arrow 2→3 -->
  <line x1="750" y1="260" x2="820" y2="260" stroke="#14b8a6" stroke-width="2"/>
  <polygon points="818,254 830,260 818,266" fill="#14b8a6"/>

  <!-- Phase 3: Human-Last -->
  <rect x="840" y="120" width="300" height="280" fill="#111" stroke="#f59e0b" stroke-width="2"/>
  <rect x="840" y="120" width="300" height="6" fill="#f59e0b"/>
  <text x="990" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#f59e0b" font-weight="700">PHASE 3</text>
  <text x="990" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Human-Last</text>
  <text x="990" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#999">Verification &amp; Delivery</text>
  
  <line x1="870" y1="230" x2="1110" y2="230" stroke="#222" stroke-width="1"/>
  
  <text x="870" y="255" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Domain-mapped quality gates</text>
  <text x="870" y="275" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Final delivery verification</text>
  <text x="870" y="295" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Demo / acceptance</text>
  <text x="870" y="315" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Data collection for retro</text>
  <text x="870" y="335" font-family="system-ui, sans-serif" font-size="11" fill="#777">▸ Feedback to Phase 1</text>
  
  <text x="990" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b">HUMANS VERIFY &amp; CLOSE</text>

  <!-- Calibrate feedback loop (bottom, going back to Phase 1) -->
  <path d="M 990 400 L 990 470 L 210 470 L 210 400" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="206,402 210,394 214,402" fill="#f59e0b"/>
  
  <!-- Calibrate label -->
  <rect x="520" y="455" width="160" height="30" fill="#0a0a0a"/>
  <text x="600" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#f59e0b">CALIBRATE</text>
  <text x="600" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">Retro → Reconfigure → Evolve</text>

  <!-- Footer -->
  <rect x="60" y="530" width="1080" height="35" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="600" y="552" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666">Without calibration: a pipeline. With calibration: an evolving system.</text>
  
  <text x="1140" y="585" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#333">ADAPT FRAMEWORK</text>
</svg>