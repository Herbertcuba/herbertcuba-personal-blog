<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" width="1200" height="550">
  <rect width="1200" height="550" fill="#0a0a0a"/>
  <text x="600" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">THE TEN PRINCIPLES</text>
  <line x1="200" y1="50" x2="1000" y2="50" stroke="#333" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="30" y="70" width="370" height="70" fill="#111" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="50" y="97" font-family="system-ui, sans-serif" font-size="13" fill="#14b8a6" font-weight="700">01</text>
  <text x="85" y="97" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Harness First</text>
  <text x="85" y="120" font-family="system-ui, sans-serif" font-size="11" fill="#777">Runtime choice sets all constraints</text>

  <rect x="415" y="70" width="370" height="70" fill="#111" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="435" y="97" font-family="system-ui, sans-serif" font-size="13" fill="#14b8a6" font-weight="700">02</text>
  <text x="470" y="97" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Human at the Bookends</text>
  <text x="470" y="120" font-family="system-ui, sans-serif" font-size="11" fill="#777">Specify and verify. Agents execute in the middle.</text>

  <rect x="800" y="70" width="370" height="70" fill="#111" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="820" y="97" font-family="system-ui, sans-serif" font-size="13" fill="#14b8a6" font-weight="700">03</text>
  <text x="855" y="97" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Spec Quality = Output Quality</text>
  <text x="855" y="120" font-family="system-ui, sans-serif" font-size="11" fill="#777">Better specs produce better results</text>

  <!-- Row 2 -->
  <rect x="30" y="155" width="370" height="70" fill="#111" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="50" y="182" font-family="system-ui, sans-serif" font-size="13" fill="#14b8a6" font-weight="700">04</text>
  <text x="85" y="182" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Agents Review Agents First</text>
  <text x="85" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#777">Speed without sacrificing quality</text>

  <rect x="415" y="155" width="370" height="70" fill="#111" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="435" y="182" font-family="system-ui, sans-serif" font-size="13" fill="#14b8a6" font-weight="700">05</text>
  <text x="470" y="182" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Domain-Mapped Ownership</text>
  <text x="470" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#777">Right person verifies the right thing</text>

  <rect x="800" y="155" width="370" height="70" fill="#111" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="820" y="182" font-family="system-ui, sans-serif" font-size="13" fill="#14b8a6" font-weight="700">06</text>
  <text x="855" y="182" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Iterate Often, Iterate Fast</text>
  <text x="855" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#777">Agent loops compress days into hours</text>

  <!-- Row 3 -->
  <rect x="30" y="240" width="370" height="70" fill="#111" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="50" y="267" font-family="system-ui, sans-serif" font-size="13" fill="#14b8a6" font-weight="700">07</text>
  <text x="85" y="267" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Least Privilege</text>
  <text x="85" y="290" font-family="system-ui, sans-serif" font-size="11" fill="#777">Only the access each agent needs</text>

  <rect x="415" y="240" width="370" height="70" fill="#111" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="435" y="267" font-family="system-ui, sans-serif" font-size="13" fill="#14b8a6" font-weight="700">08</text>
  <text x="470" y="267" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Calibrate the System</text>
  <text x="470" y="290" font-family="system-ui, sans-serif" font-size="11" fill="#777">Not just the output — the system itself</text>

  <rect x="800" y="240" width="370" height="70" fill="#111" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="820" y="267" font-family="system-ui, sans-serif" font-size="13" fill="#14b8a6" font-weight="700">09</text>
  <text x="855" y="267" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Data-Driven Reflections</text>
  <text x="855" y="290" font-family="system-ui, sans-serif" font-size="11" fill="#777">Metrics, not feelings</text>

  <!-- Row 4 - centered -->
  <rect x="415" y="325" width="370" height="70" fill="#111" stroke="#e11d48" stroke-width="1.5"/>
  <text x="435" y="352" font-family="system-ui, sans-serif" font-size="13" fill="#e11d48" font-weight="700">10</text>
  <text x="470" y="352" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Think Big, Scale Back</text>
  <text x="470" y="375" font-family="system-ui, sans-serif" font-size="11" fill="#777">Vision first, trim what doesn't work yet</text>

  <text x="600" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#555">Each principle earns its place through practice, not theory.</text>
  <text x="1170" y="530" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#333">APEX FRAMEWORK</text>
</svg>