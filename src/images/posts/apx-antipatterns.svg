<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="1000" height="450">
  <rect width="1000" height="450" fill="#0a0a0a"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff">SEVEN ANTI-PATTERNS</text>
  <text x="500" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#666">Common failure modes and their fixes</text>
  <line x1="200" y1="68" x2="800" y2="68" stroke="#333" stroke-width="1"/>

  <rect x="30" y="80" width="300" height="80" fill="#111" stroke="#e11d48" stroke-width="1"/>
  <text x="50" y="105" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#e11d48">❌ Everybody Reviews Everything</text>
  <text x="50" y="125" font-family="system-ui, sans-serif" font-size="9" fill="#777">Generic reviews → inconsistency</text>
  <text x="50" y="145" font-family="system-ui, sans-serif" font-size="9" fill="#14b8a6">✓ Fix: Domain-mapped ownership</text>

  <rect x="350" y="80" width="300" height="80" fill="#111" stroke="#e11d48" stroke-width="1"/>
  <text x="370" y="105" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#e11d48">❌ Set-and-Forget System</text>
  <text x="370" y="125" font-family="system-ui, sans-serif" font-size="9" fill="#777">No reflections → degradation</text>
  <text x="370" y="145" font-family="system-ui, sans-serif" font-size="9" fill="#14b8a6">✓ Fix: Calibrate every cycle</text>

  <rect x="670" y="80" width="300" height="80" fill="#111" stroke="#e11d48" stroke-width="1"/>
  <text x="690" y="105" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#e11d48">❌ The Promptless Agent</text>
  <text x="690" y="125" font-family="system-ui, sans-serif" font-size="9" fill="#777">No context → generic output</text>
  <text x="690" y="145" font-family="system-ui, sans-serif" font-size="9" fill="#14b8a6">✓ Fix: Invest in Intent Architecture</text>

  <rect x="30" y="175" width="300" height="80" fill="#111" stroke="#e11d48" stroke-width="1"/>
  <text x="50" y="200" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#e11d48">❌ The Unlimited Agent</text>
  <text x="50" y="220" font-family="system-ui, sans-serif" font-size="9" fill="#777">Full access → risk</text>
  <text x="50" y="240" font-family="system-ui, sans-serif" font-size="9" fill="#14b8a6">✓ Fix: Least privilege + Permission Map</text>

  <rect x="350" y="175" width="300" height="80" fill="#111" stroke="#e11d48" stroke-width="1"/>
  <text x="370" y="200" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#e11d48">❌ Human-in-the-Middle</text>
  <text x="370" y="220" font-family="system-ui, sans-serif" font-size="9" fill="#777">Reviewing every iteration → kills speed</text>
  <text x="370" y="240" font-family="system-ui, sans-serif" font-size="9" fill="#14b8a6">✓ Fix: Agents review agents first</text>

  <rect x="670" y="175" width="300" height="80" fill="#111" stroke="#e11d48" stroke-width="1"/>
  <text x="690" y="200" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#e11d48">❌ Missing Harness Decision</text>
  <text x="690" y="220" font-family="system-ui, sans-serif" font-size="9" fill="#777">Wrong runtime → wrong constraints</text>
  <text x="690" y="240" font-family="system-ui, sans-serif" font-size="9" fill="#14b8a6">✓ Fix: Harness first, always</text>

  <rect x="350" y="270" width="300" height="80" fill="#111" stroke="#e11d48" stroke-width="1"/>
  <text x="370" y="295" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#e11d48">❌ Feeling-Based Reflection</text>
  <text x="370" y="315" font-family="system-ui, sans-serif" font-size="9" fill="#777">Opinions over data → bad calibration</text>
  <text x="370" y="335" font-family="system-ui, sans-serif" font-size="9" fill="#14b8a6">✓ Fix: Data-driven, agents report metrics</text>

  <text x="970" y="430" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#333">ADAPT FRAMEWORK</text>
</svg>