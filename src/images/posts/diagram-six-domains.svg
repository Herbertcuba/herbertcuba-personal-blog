<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520">
  <rect width="1200" height="520" fill="#0a0a0a"/>
  
  <text x="600" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">THE FIVE DOMAINS</text>
  <text x="600" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666">Each domain produces artifacts that agents consume during execution</text>
  <line x1="200" y1="75" x2="1000" y2="75" stroke="#333" stroke-width="1"/>

  <!-- Row 1: 3 domains -->
  <rect x="30" y="95" width="370" height="170" fill="#111" stroke="#14b8a6" stroke-width="2"/>
  <rect x="30" y="95" width="370" height="5" fill="#14b8a6"/>
  <text x="50" y="125" font-family="system-ui, sans-serif" font-size="13" fill="#14b8a6" font-weight="600">01</text>
  <text x="50" y="150" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Platform Architecture</text>
  <text x="50" y="173" font-family="system-ui, sans-serif" font-size="12" fill="#999">Harness, infrastructure, tools, stability</text>
  <line x1="50" y1="185" x2="380" y2="185" stroke="#222" stroke-width="1"/>
  <text x="50" y="205" font-family="system-ui, sans-serif" font-size="10" fill="#14b8a6">ARTIFACTS:</text>
  <text x="50" y="223" font-family="system-ui, sans-serif" font-size="11" fill="#666">Harness Decision Record, Tool Registry,</text>
  <text x="50" y="241" font-family="system-ui, sans-serif" font-size="11" fill="#666">Infrastructure Config, CI/CD, monitoring</text>

  <rect x="415" y="95" width="370" height="170" fill="#111" stroke="#14b8a6" stroke-width="2"/>
  <rect x="415" y="95" width="370" height="5" fill="#14b8a6"/>
  <text x="435" y="125" font-family="system-ui, sans-serif" font-size="13" fill="#14b8a6" font-weight="600">02</text>
  <text x="435" y="150" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Intent Architecture</text>
  <text x="435" y="173" font-family="system-ui, sans-serif" font-size="12" fill="#999">Context, memory, and state</text>
  <line x1="435" y1="185" x2="765" y2="185" stroke="#222" stroke-width="1"/>
  <text x="435" y="205" font-family="system-ui, sans-serif" font-size="10" fill="#14b8a6">ARTIFACTS:</text>
  <text x="435" y="223" font-family="system-ui, sans-serif" font-size="11" fill="#666">Business case, brand guidelines, design system,</text>
  <text x="435" y="241" font-family="system-ui, sans-serif" font-size="11" fill="#666">PRD, specs, personas, memory logs</text>

  <rect x="800" y="95" width="370" height="170" fill="#111" stroke="#14b8a6" stroke-width="2"/>
  <rect x="800" y="95" width="370" height="5" fill="#14b8a6"/>
  <text x="820" y="125" font-family="system-ui, sans-serif" font-size="13" fill="#14b8a6" font-weight="600">03</text>
  <text x="820" y="150" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Workflow Design</text>
  <text x="820" y="173" font-family="system-ui, sans-serif" font-size="12" fill="#999">Agentic flows, agent behavior, orchestration</text>
  <line x1="820" y1="185" x2="1150" y2="185" stroke="#222" stroke-width="1"/>
  <text x="820" y="205" font-family="system-ui, sans-serif" font-size="10" fill="#14b8a6">ARTIFACTS:</text>
  <text x="820" y="223" font-family="system-ui, sans-serif" font-size="11" fill="#666">Agent Roster, Agent Identity Files,</text>
  <text x="820" y="241" font-family="system-ui, sans-serif" font-size="11" fill="#666">Workflow Map, routing rules, done-criteria</text>

  <!-- Row 2: 2 domains centered -->
  <rect x="220" y="290" width="370" height="170" fill="#111" stroke="#14b8a6" stroke-width="2"/>
  <rect x="220" y="290" width="370" height="5" fill="#14b8a6"/>
  <text x="240" y="320" font-family="system-ui, sans-serif" font-size="13" fill="#14b8a6" font-weight="600">04</text>
  <text x="240" y="345" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Quality Engineering</text>
  <text x="240" y="368" font-family="system-ui, sans-serif" font-size="12" fill="#999">Validation and human judgment</text>
  <line x1="240" y1="380" x2="570" y2="380" stroke="#222" stroke-width="1"/>
  <text x="240" y="400" font-family="system-ui, sans-serif" font-size="10" fill="#14b8a6">ARTIFACTS:</text>
  <text x="240" y="418" font-family="system-ui, sans-serif" font-size="11" fill="#666">Review Criteria, Reflection Reports,</text>
  <text x="240" y="436" font-family="system-ui, sans-serif" font-size="11" fill="#666">quality gates, HITL thresholds</text>

  <rect x="610" y="290" width="370" height="170" fill="#111" stroke="#14b8a6" stroke-width="2"/>
  <rect x="610" y="290" width="370" height="5" fill="#14b8a6"/>
  <text x="630" y="320" font-family="system-ui, sans-serif" font-size="13" fill="#14b8a6" font-weight="600">05</text>
  <text x="630" y="345" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Trust Architecture</text>
  <text x="630" y="368" font-family="system-ui, sans-serif" font-size="12" fill="#999">Security, permissions, and compliance</text>
  <line x1="630" y1="380" x2="960" y2="380" stroke="#222" stroke-width="1"/>
  <text x="630" y="400" font-family="system-ui, sans-serif" font-size="10" fill="#14b8a6">ARTIFACTS:</text>
  <text x="630" y="418" font-family="system-ui, sans-serif" font-size="11" fill="#666">Permission Map, Domain Ownership Matrix,</text>
  <text x="630" y="436" font-family="system-ui, sans-serif" font-size="11" fill="#666">audit trails, compliance requirements</text>

  <!-- Footer -->
  <text x="600" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#555">Domains, not roles. One person can own several. All five must be covered.</text>
  <text x="1170" y="515" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#333">APX FRAMEWORK</text>
</svg>