<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 680" width="700" height="680">
  <rect width="700" height="680" fill="#0a0a0a"/>
  
  <text x="350" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#ffffff">THE SIX DOMAINS</text>
  <text x="350" y="57" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#666">Each domain produces artifacts that agents consume during execution</text>
  <line x1="100" y1="70" x2="600" y2="70" stroke="#333" stroke-width="1"/>

  <!-- Row 1 -->
  <!-- 1. Harness Architecture -->
  <rect x="20" y="90" width="320" height="150" fill="#111" stroke="#14b8a6" stroke-width="2"/>
  <rect x="20" y="90" width="320" height="4" fill="#14b8a6"/>
  <text x="40" y="120" font-family="system-ui, sans-serif" font-size="12" fill="#14b8a6" font-weight="600">01</text>
  <text x="40" y="145" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Harness Architecture</text>
  <text x="40" y="168" font-family="system-ui, sans-serif" font-size="11" fill="#999">The runtime that makes everything possible</text>
  <line x1="40" y1="180" x2="320" y2="180" stroke="#222" stroke-width="1"/>
  <text x="40" y="200" font-family="system-ui, sans-serif" font-size="10" fill="#14b8a6">ARTIFACTS:</text>
  <text x="40" y="218" font-family="system-ui, sans-serif" font-size="10" fill="#666">Harness Decision Record</text>

  <!-- 2. Intent Architecture -->
  <rect x="360" y="90" width="320" height="150" fill="#111" stroke="#14b8a6" stroke-width="2"/>
  <rect x="360" y="90" width="320" height="4" fill="#14b8a6"/>
  <text x="380" y="120" font-family="system-ui, sans-serif" font-size="12" fill="#14b8a6" font-weight="600">02</text>
  <text x="380" y="145" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Intent Architecture</text>
  <text x="380" y="168" font-family="system-ui, sans-serif" font-size="11" fill="#999">Context, identity, memory, and state</text>
  <line x1="380" y1="180" x2="660" y2="180" stroke="#222" stroke-width="1"/>
  <text x="380" y="200" font-family="system-ui, sans-serif" font-size="10" fill="#14b8a6">ARTIFACTS:</text>
  <text x="380" y="218" font-family="system-ui, sans-serif" font-size="10" fill="#666">Business case, brand guidelines, design system,</text>
  <text x="380" y="232" font-family="system-ui, sans-serif" font-size="10" fill="#666">PRD, specs, personas, agent identity files</text>

  <!-- Row 2 -->
  <!-- 3. Workflow Design -->
  <rect x="20" y="260" width="320" height="150" fill="#111" stroke="#14b8a6" stroke-width="2"/>
  <rect x="20" y="260" width="320" height="4" fill="#14b8a6"/>
  <text x="40" y="290" font-family="system-ui, sans-serif" font-size="12" fill="#14b8a6" font-weight="600">03</text>
  <text x="40" y="315" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Workflow Design</text>
  <text x="40" y="338" font-family="system-ui, sans-serif" font-size="11" fill="#999">Orchestration, delegation, and routing</text>
  <line x1="40" y1="350" x2="320" y2="350" stroke="#222" stroke-width="1"/>
  <text x="40" y="370" font-family="system-ui, sans-serif" font-size="10" fill="#14b8a6">ARTIFACTS:</text>
  <text x="40" y="388" font-family="system-ui, sans-serif" font-size="10" fill="#666">Agent Roster, Workflow Map,</text>
  <text x="40" y="402" font-family="system-ui, sans-serif" font-size="10" fill="#666">routing rules, done-criteria</text>

  <!-- 4. Platform Operations -->
  <rect x="360" y="260" width="320" height="150" fill="#111" stroke="#14b8a6" stroke-width="2"/>
  <rect x="360" y="260" width="320" height="4" fill="#14b8a6"/>
  <text x="380" y="290" font-family="system-ui, sans-serif" font-size="12" fill="#14b8a6" font-weight="600">04</text>
  <text x="380" y="315" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Platform Operations</text>
  <text x="380" y="338" font-family="system-ui, sans-serif" font-size="11" fill="#999">Infrastructure, tools, and execution</text>
  <line x1="380" y1="350" x2="660" y2="350" stroke="#222" stroke-width="1"/>
  <text x="380" y="370" font-family="system-ui, sans-serif" font-size="10" fill="#14b8a6">ARTIFACTS:</text>
  <text x="380" y="388" font-family="system-ui, sans-serif" font-size="10" fill="#666">Tool Registry, Infrastructure Config,</text>
  <text x="380" y="402" font-family="system-ui, sans-serif" font-size="10" fill="#666">deployment setup, monitoring</text>

  <!-- Row 3 -->
  <!-- 5. Quality Engineering -->
  <rect x="20" y="430" width="320" height="150" fill="#111" stroke="#14b8a6" stroke-width="2"/>
  <rect x="20" y="430" width="320" height="4" fill="#14b8a6"/>
  <text x="40" y="460" font-family="system-ui, sans-serif" font-size="12" fill="#14b8a6" font-weight="600">05</text>
  <text x="40" y="485" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Quality Engineering</text>
  <text x="40" y="508" font-family="system-ui, sans-serif" font-size="11" fill="#999">Validation and human judgment</text>
  <line x1="40" y1="520" x2="320" y2="520" stroke="#222" stroke-width="1"/>
  <text x="40" y="540" font-family="system-ui, sans-serif" font-size="10" fill="#14b8a6">ARTIFACTS:</text>
  <text x="40" y="558" font-family="system-ui, sans-serif" font-size="10" fill="#666">Review Criteria, Reflection Reports,</text>
  <text x="40" y="572" font-family="system-ui, sans-serif" font-size="10" fill="#666">quality gates, escalation rules</text>

  <!-- 6. Trust Architecture -->
  <rect x="360" y="430" width="320" height="150" fill="#111" stroke="#14b8a6" stroke-width="2"/>
  <rect x="360" y="430" width="320" height="4" fill="#14b8a6"/>
  <text x="380" y="460" font-family="system-ui, sans-serif" font-size="12" fill="#14b8a6" font-weight="600">06</text>
  <text x="380" y="485" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Trust Architecture</text>
  <text x="380" y="508" font-family="system-ui, sans-serif" font-size="11" fill="#999">Security, permissions, and compliance</text>
  <line x1="380" y1="520" x2="660" y2="520" stroke="#222" stroke-width="1"/>
  <text x="380" y="540" font-family="system-ui, sans-serif" font-size="10" fill="#14b8a6">ARTIFACTS:</text>
  <text x="380" y="558" font-family="system-ui, sans-serif" font-size="10" fill="#666">Permission Map, Domain Ownership Matrix,</text>
  <text x="380" y="572" font-family="system-ui, sans-serif" font-size="10" fill="#666">audit trails, compliance requirements</text>

  <!-- Footer -->
  <rect x="20" y="605" width="660" height="35" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="350" y="627" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#666">Domains, not roles. One person can own several. All six must be covered.</text>

  <text x="680" y="665" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#333">APX FRAMEWORK</text>
</svg>