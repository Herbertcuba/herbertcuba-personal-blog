<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" width="1200" height="650">
  <rect width="1200" height="650" fill="#0a0a0a"/>
  
  <text x="600" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">15 CAPABILITIES ACROSS THREE AREAS</text>
  <text x="600" y="57" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666">The anatomy of a Level 3 agent, organized by the APEX Framework</text>
  <line x1="200" y1="70" x2="1000" y2="70" stroke="#333" stroke-width="1"/>

  <!-- PLATFORM AREA -->
  <rect x="20" y="90" width="380" height="500" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8,4" rx="4"/>
  <text x="40" y="115" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#3b82f6">PLATFORM AREA</text>
  <text x="40" y="135" font-family="system-ui, sans-serif" font-size="11" fill="#555">The foundation everything runs on</text>

  <rect x="35" y="150" width="350" height="60" fill="#111" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="55" y="177" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Architecture (Runtime/Harness)</text>
  <text x="55" y="198" font-family="system-ui, sans-serif" font-size="10" fill="#777">General Purpose · Specialized · Autonomous · DAG · Hybrid</text>

  <rect x="35" y="220" width="350" height="60" fill="#111" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="55" y="247" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Infrastructure</text>
  <text x="55" y="268" font-family="system-ui, sans-serif" font-size="10" fill="#777">Compute, deployment, CI/CD, scaling, uptime</text>

  <rect x="35" y="290" width="350" height="60" fill="#111" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="55" y="317" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">File System</text>
  <text x="55" y="338" font-family="system-ui, sans-serif" font-size="10" fill="#777">Persistent workspace, read/write access</text>

  <rect x="35" y="360" width="350" height="60" fill="#111" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="55" y="387" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Code Execution</text>
  <text x="55" y="408" font-family="system-ui, sans-serif" font-size="10" fill="#777">Shell, scripts, builds, sandboxed environments</text>

  <rect x="35" y="430" width="350" height="60" fill="#111" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="55" y="457" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Security</text>
  <text x="55" y="478" font-family="system-ui, sans-serif" font-size="10" fill="#777">Permissions, sandboxing, audit trails, compliance</text>

  <text x="210" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6">5 capabilities</text>

  <!-- SPECIFICATION AREA -->
  <rect x="410" y="90" width="380" height="500" fill="none" stroke="#14b8a6" stroke-width="2" stroke-dasharray="8,4" rx="4"/>
  <text x="430" y="115" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#14b8a6">SPECIFICATION AREA</text>
  <text x="430" y="135" font-family="system-ui, sans-serif" font-size="11" fill="#555">What the system knows and remembers</text>

  <rect x="425" y="150" width="350" height="80" fill="#111" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="445" y="177" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Context Management</text>
  <text x="445" y="198" font-family="system-ui, sans-serif" font-size="10" fill="#777">System prompts, workspace files, project docs,</text>
  <text x="445" y="216" font-family="system-ui, sans-serif" font-size="10" fill="#777">business case, brand, personas</text>

  <rect x="425" y="240" width="350" height="80" fill="#111" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="445" y="267" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">State Management</text>
  <text x="445" y="288" font-family="system-ui, sans-serif" font-size="10" fill="#777">Session scope, context windows,</text>
  <text x="445" y="306" font-family="system-ui, sans-serif" font-size="10" fill="#777">compaction strategies</text>

  <rect x="425" y="330" width="350" height="100" fill="#111" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="445" y="357" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Memory</text>
  <text x="445" y="378" font-family="system-ui, sans-serif" font-size="10" fill="#777">Daily logs, long-term curated memory,</text>
  <text x="445" y="396" font-family="system-ui, sans-serif" font-size="10" fill="#777">journaling, accumulated project context.</text>
  <text x="445" y="418" font-family="system-ui, sans-serif" font-size="10" fill="#555">The most underrated capability.</text>

  <text x="600" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#14b8a6">3 capabilities</text>

  <!-- CONFIG AREA -->
  <rect x="800" y="90" width="380" height="500" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8,4" rx="4"/>
  <text x="820" y="115" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#f59e0b">CONFIG AREA</text>
  <text x="820" y="135" font-family="system-ui, sans-serif" font-size="11" fill="#555">How agents work and are verified</text>

  <rect x="815" y="150" width="350" height="60" fill="#111" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="835" y="177" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Planning</text>
  <text x="835" y="198" font-family="system-ui, sans-serif" font-size="10" fill="#777">Task decomposition, step generation</text>

  <rect x="815" y="220" width="350" height="60" fill="#111" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="835" y="247" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Delegation &amp; Routing</text>
  <text x="835" y="268" font-family="system-ui, sans-serif" font-size="10" fill="#777">Multi-agent dispatch, org chart, communication</text>

  <rect x="815" y="290" width="350" height="60" fill="#111" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="835" y="317" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Skills &amp; Tool Calling</text>
  <text x="835" y="338" font-family="system-ui, sans-serif" font-size="10" fill="#777">APIs, CLI, MCP servers, extensible capabilities</text>

  <rect x="815" y="360" width="350" height="60" fill="#111" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="835" y="387" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Validation</text>
  <text x="835" y="408" font-family="system-ui, sans-serif" font-size="10" fill="#777">Agent-to-agent review, automated quality checks</text>

  <rect x="815" y="430" width="350" height="60" fill="#111" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="835" y="457" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Human-in-the-Loop</text>
  <text x="835" y="478" font-family="system-ui, sans-serif" font-size="10" fill="#777">Judgment layer, escalation, quality gates</text>

  <text x="990" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#f59e0b">5 + 2 capabilities</text>

  <!-- Footer -->
  <text x="600" y="620" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#555">15 capabilities. Three areas. All must be covered to reach Level 3.</text>
  <text x="1170" y="640" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#333">APEX FRAMEWORK</text>
</svg>