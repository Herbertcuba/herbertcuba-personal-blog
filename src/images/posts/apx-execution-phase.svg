<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <rect width="1200" height="400" fill="#0a0a0a"/>
  
  <text x="600" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">THE EXECUTION PHASE</text>
  <text x="600" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666">Agentic-First · Velocity: 10-20x</text>
  <line x1="250" y1="68" x2="950" y2="68" stroke="#333" stroke-width="1"/>

  <!-- Step 1: Spec Input -->
  <rect x="30" y="120" width="170" height="80" fill="#111" stroke="#3b82f6" stroke-width="2" rx="2"/>
  <text x="115" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Spec Input</text>
  <text x="115" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6">From Strategic Phase</text>

  <!-- Arrow -->
  <line x1="200" y1="160" x2="240" y2="160" stroke="#555" stroke-width="2"/>
  <polygon points="238,154 250,160 238,166" fill="#f59e0b"/>

  <!-- Step 2: Agentic Work -->
  <rect x="250" y="120" width="180" height="80" fill="#111" stroke="#f59e0b" stroke-width="2" rx="2"/>
  <text x="340" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Agentic Work</text>
  <text x="340" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b">Agent executes</text>

  <!-- Arrow -->
  <line x1="430" y1="160" x2="470" y2="160" stroke="#555" stroke-width="2"/>
  <polygon points="468,154 480,160 468,166" fill="#f59e0b"/>

  <!-- Step 3: Agentic Review -->
  <rect x="480" y="120" width="180" height="80" fill="#111" stroke="#f59e0b" stroke-width="2" rx="2"/>
  <text x="570" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Agentic Review</text>
  <text x="570" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b">Agent reviews output</text>

  <!-- Arrow -->
  <line x1="660" y1="160" x2="700" y2="160" stroke="#555" stroke-width="2"/>
  <polygon points="698,154 710,160 698,166" fill="#e11d48"/>

  <!-- Quality Gate -->
  <rect x="710" y="115" width="100" height="90" fill="#111" stroke="#e11d48" stroke-width="2.5" rx="2"/>
  <text x="760" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#e11d48">Quality</text>
  <text x="760" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#e11d48">Gate</text>
  <text x="760" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#777">QA Operational</text>

  <!-- Iterate loop (below, back to Agentic Work) -->
  <path d="M 760 205 L 760 270 L 340 270 L 340 200" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="336,202 340,194 344,202" fill="#f59e0b"/>
  <text x="550" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f59e0b">ITERATE — × cycles until spec is met</text>

  <!-- Arrow to Human Verification (pass) -->
  <line x1="810" y1="160" x2="870" y2="160" stroke="#555" stroke-width="2"/>
  <polygon points="868,154 880,160 868,166" fill="#14b8a6"/>
  <text x="845" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#14b8a6">pass</text>

  <!-- Step 5: Human Verification -->
  <rect x="880" y="110" width="280" height="100" fill="#111" stroke="#14b8a6" stroke-width="2.5" rx="2"/>
  <rect x="880" y="110" width="280" height="5" fill="#14b8a6"/>
  <text x="1020" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Human Verification</text>
  <text x="1020" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#14b8a6">Domain-mapped · QA Strategic criteria</text>
  <text x="1020" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#555">Accept → Delivery  |  Reject → Back to loop</text>

  <!-- Legend at bottom -->
  <rect x="30" y="330" width="12" height="12" fill="#3b82f6"/>
  <text x="50" y="341" font-family="system-ui, sans-serif" font-size="10" fill="#777">From Strategic</text>
  
  <rect x="200" y="330" width="12" height="12" fill="#f59e0b"/>
  <text x="220" y="341" font-family="system-ui, sans-serif" font-size="10" fill="#777">Agent work (inner loop)</text>
  
  <rect x="420" y="330" width="12" height="12" fill="#e11d48"/>
  <text x="440" y="341" font-family="system-ui, sans-serif" font-size="10" fill="#777">Quality Gate (QA Operational)</text>
  
  <rect x="660" y="330" width="12" height="12" fill="#14b8a6"/>
  <text x="680" y="341" font-family="system-ui, sans-serif" font-size="10" fill="#777">Human Verification (QA Strategic)</text>

  <text x="1170" y="385" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#333">APEX FRAMEWORK</text>
</svg>