<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" width="1200" height="550">
  <rect width="1200" height="550" fill="#0a0a0a"/>
  
  <text x="600" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">THE EXECUTION PHASE</text>
  <text x="600" y="57" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666">Agentic-First · Velocity: 10-20x · Humans verify, agents execute</text>
  <line x1="250" y1="70" x2="950" y2="70" stroke="#333" stroke-width="1"/>

  <!-- Inner Loop Circle (open) -->
  <path d="M 680 130 A 200 200 0 1 0 720 270" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <polygon points="722,265 728,280 714,274" fill="#f59e0b"/>

  <!-- Quality Gate in the gap -->
  <rect x="665" y="140" width="100" height="50" fill="#111" stroke="#e11d48" stroke-width="2" rx="2"/>
  <text x="715" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#e11d48">QUALITY</text>
  <text x="715" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#e11d48">GATE</text>
  <text x="715" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#555">QA Operational</text>

  <!-- Steps along the circle -->
  <!-- Top-left: Spec Input -->
  <rect x="250" y="100" width="180" height="55" fill="#111" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="340" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#3b82f6">Spec Input</text>
  <text x="340" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#777">From Strategic Phase</text>

  <!-- Left: Agentic Work -->
  <rect x="100" y="250" width="180" height="70" fill="#111" stroke="#f59e0b" stroke-width="1.5" rx="2"/>
  <text x="190" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Agentic Work</text>
  <text x="190" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b">Agent executes against spec</text>

  <!-- Bottom: Agentic Review -->
  <rect x="300" y="400" width="180" height="70" fill="#111" stroke="#f59e0b" stroke-width="1.5" rx="2"/>
  <text x="390" y="428" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Agentic Review</text>
  <text x="390" y="448" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b">Agent reviews against criteria</text>

  <!-- Right-bottom: Iterate decision -->
  <rect x="570" y="380" width="120" height="50" fill="#111" stroke="#f59e0b" stroke-width="1" rx="2"/>
  <text x="630" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#f59e0b">Pass?</text>
  <text x="630" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#777">× iterations</text>

  <!-- Iterate arrow (back to Agentic Work) -->
  <path d="M 570 405 L 280 405 L 280 320" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="276,322 280,314 284,322" fill="#f59e0b"/>
  <text x="400" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b">NO → iterate</text>

  <!-- Pass arrow (to Human Verification) -->
  <line x1="690" y1="405" x2="830" y2="405" stroke="#14b8a6" stroke-width="2"/>
  <polygon points="828,399 840,405 828,411" fill="#14b8a6"/>
  <text x="760" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#14b8a6">YES →</text>

  <!-- Human Verification -->
  <rect x="850" y="360" width="220" height="90" fill="#111" stroke="#14b8a6" stroke-width="2.5" rx="2"/>
  <rect x="850" y="360" width="220" height="5" fill="#14b8a6"/>
  <text x="960" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Human</text>
  <text x="960" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Verification</text>
  <text x="960" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#14b8a6">QA Strategic criteria</text>

  <!-- Accept/Reject from Human Verification -->
  <text x="960" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#555">Accept → Delivery</text>
  <text x="960" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#555">Reject → Back to loop</text>

  <!-- Labels for the two QA levels -->
  <rect x="850" y="100" width="300" height="80" fill="#111" stroke="#333" stroke-width="1" rx="2"/>
  <text x="870" y="125" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#e11d48">TWO QA LEVELS</text>
  <text x="870" y="148" font-family="system-ui, sans-serif" font-size="11" fill="#f59e0b">▸ QA Operational — agent-to-agent checks</text>
  <text x="870" y="168" font-family="system-ui, sans-serif" font-size="11" fill="#14b8a6">▸ QA Strategic — human verification criteria</text>

  <text x="1170" y="535" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#333">APEX FRAMEWORK</text>
</svg>