name: Update trending posts

# Refreshes src/_data/trending.json from GA4 at most once per day.
# Deterministic Node script — no AI, no tokens beyond the GA service account.
# Commits + pushes only when the ranking actually changes, which triggers one
# Vercel deploy. The site build itself never calls GA; it reads the committed
# trending.json. If this job ever fails, the site still builds from the last
# committed ranking.

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC daily
  workflow_dispatch: {}    # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-trending
  cancel-in-progress: false

jobs:
  update-trending:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install GA client
        run: npm install @google-analytics/data --no-save

      - name: Fetch GA4 ranking → trending.json
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA_SERVICE_ACCOUNT_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
        run: node scripts/update-trending.mjs

      - name: Commit & push if changed
        run: |
          if git diff --quiet -- src/_data/trending.json; then
            echo "No change in trending.json — nothing to commit."
            exit 0
          fi
          git config user.name "trending-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/_data/trending.json
          git commit -m "chore(trending): refresh GA4 ranking [skip ci]"
          git push
